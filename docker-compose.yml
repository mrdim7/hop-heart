services:
  monitor-agent:
    build: ./agent
    container_name: network-monitor-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  network-monitor:
    build: .
    container_name: network-monitor-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      monitor-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
